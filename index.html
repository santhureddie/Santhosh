<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Santhosh Jampana | F1 Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header class="hud hud--top">
      <div class="brand">
        <span class="brand__flag">🏁</span>
        <div>
          <h1 id="profileName">Santhosh Kumar Reddy Jampana</h1>
          <p id="profileHeadline">Backend & Cloud Software Engineer</p>
        </div>
      </div>
      <div class="controls">
        <p id="profileLocation">Redwood City, CA</p>
        <p><strong>Drive:</strong> ← → or A D</p>
        <p><strong>Brake/Boost:</strong> ↓ ↑ or S W</p>
      </div>
    </header>

    <aside class="hud hud--side" id="infoPanel">
      <div class="panel__title-wrap">
        <h2 id="panelTitle">Welcome to my pit lane</h2>
        <span class="panel__lap" id="lapMeter">Lap 0</span>
      </div>
      <p id="panelDescription"></p>
      <ul id="panelList"></ul>
      <div id="panelActions" class="panel__actions"></div>
    </aside>

    <footer class="hud hud--bottom">
      <p>
        Built with Three.js • F1-themed interactive resume and portfolio experience.
      </p>
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
